name: Test

on:
  workflow_dispatch:

permissions:
  contents: write # Upgraded to write so the sync step can push changes back to Gitea cleanly

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # EXPLICIT CONFIGURATION: Hardcode your specific language codes here
        language: [
          'en'
        ]
    env:
      LINK_CHECKED_LANGUAGES: '["en", "fa"]'
    steps:
      # ============= InvisiRisk Setup =============
      - name: Setup PSE
        uses:  invisirisk/pse-action@latest
        with:
          api_url: "https://app.invisirisk.com"
          app_token: ${{secrets.IR_API_KEY}}
      # ============= InvisiRisk Setup End =============
      
      # 2. Checkout your Gitea Workspace
      - name: Checkout Gitea Workspace
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history required to merge upstream branches cleanly

    

      - name: Install Rust Toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Setup Rust cache
        uses: ./.github/workflows/setup-rust-cache
        with:
          key: ${{ contains(fromJSON(env.LINK_CHECKED_LANGUAGES), matrix.language) }}

      - name: Install dependencies
        uses: ./.github/workflows/apt-get-install
        with:
          packages: gettext

      - name: Install System Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev

      - name: Install mdbook
        uses: ./.github/workflows/install-mdbook

      - name: Build ${{ matrix.language }} translation
        run: |
          .github/workflows/build.sh ${{ matrix.language }} book/comprehensive-rust-${{ matrix.language }}


  web-tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      # ============= InvisiRisk Setup =============
      - name: Setup PSE
        uses:  invisirisk/pse-action@latest
        with:
          api_url: "https://app.invisirisk.com"
          app_token: ${{secrets.IR_API_KEY}}
      # ============= InvisiRisk Setup End =============


      # 4. Native Environment Setup and original test sequence
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: "tests/package-lock.json"
          
      - name: Install test framework
        run: npm install
        working-directory: ./tests

